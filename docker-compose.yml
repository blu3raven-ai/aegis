# SECURITY: In production, deploy a reverse proxy (nginx/caddy) with TLS
# for all service-to-service communication. Internal Docker network provides
# isolation but not encryption.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
      - scanner
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-scans}
      S3_REGION: ${S3_REGION:-us-east-1}
      JWT_SHARED_SECRET: ${JWT_SHARED_SECRET:?Set JWT_SHARED_SECRET in .env}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN:?Set RUNNER_REGISTRATION_TOKEN in .env}
      RUNNER_S3_SECRET_KEY: ${RUNNER_S3_SECRET_KEY:?Set RUNNER_S3_SECRET_KEY in .env}
      FASTAPI_ENV: production
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  runner:
    build: ./runner
    environment:
      BACKEND_URL: http://backend:8000
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN:?Set RUNNER_REGISTRATION_TOKEN in .env}
      RUNNER_NAME: ${RUNNER_NAME:-runner}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: runner-svc
      S3_SECRET_KEY: ${RUNNER_S3_SECRET_KEY:?Set RUNNER_S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-scans}
      SCANNER_DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-vulnerability-management-portal}_scanner
      SCANNER_WORKSPACE_VOLUME: ${COMPOSE_PROJECT_NAME:-vulnerability-management-portal}_runner-workspace
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      # SECURITY: Docker socket required for scanner orchestration.
      # In production, use a Docker API proxy (e.g., Tecnativa/docker-socket-proxy)
      # to restrict allowed operations to container create/start/stop/rm only.
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-workspace:/workspace
      - ./scanners:/scanners:ro
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: .
    environment:
      FASTAPI_URL: http://backend:8000
      NODE_ENV: production
      JWT_SHARED_SECRET: ${JWT_SHARED_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "${APP_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: 1G
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge
  scanner:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  runner-workspace:
