# SECURITY: In production, deploy a reverse proxy (nginx/caddy) with TLS
# for all service-to-service communication. Internal Docker network provides
# isolation but not encryption.
services:
  postgres:
    image: postgres:16-alpine
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETUID, SETGID, DAC_READ_SEARCH]
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    read_only: true
    tmpfs:
      - /tmp
      - /root              # mc client writes config here
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  aegis:
    build: .
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /home/app:size=20m,uid=10001,gid=10001
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-scans}
      S3_REGION: ${S3_REGION:-us-east-1}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN:?Set RUNNER_REGISTRATION_TOKEN in .env}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      # Public base URL used to build links in outbound email (e.g. the
      # email-change confirmation link). Set to how users reach the app.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      # SMTP is required for transactional email (email-change verification).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Mounts the e2e fixture-seed endpoint. Empty (off) everywhere except CI e2e.
      ENABLE_TEST_ENDPOINTS: ${ENABLE_TEST_ENDPOINTS:-}
      FASTAPI_ENV: production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
          pids: 512
    ports:
      - "${APP_PORT:-127.0.0.1:3000}:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  runner:
    build: ./runner
    # NOTE: this service intentionally does NOT carry the read-only / cap-drop
    # hardening its siblings do. It runs a nested rootless-podman detonation
    # sandbox that needs userns setup (newuidmap/newgidmap) and writable podman
    # state; applying that hardening to the outer container breaks the sandbox.
    # The untrusted-code path is hardened per detonation container instead.
    #
    # seccomp=unconfined is required by the gVisor (runsc) detonation tier: its
    # systrap platform re-execs itself with syscalls the default profile filters.
    # This is a far smaller grant than --privileged and does NOT mount the host
    # Docker socket, so the outer container stays non-root and host-isolated.
    security_opt:
      - seccomp:unconfined
    environment:
      BACKEND_URL: http://aegis:3000
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN:?Set RUNNER_REGISTRATION_TOKEN in .env}
      RUNNER_NAME: ${RUNNER_NAME:-runner}
      # On by default; runs the runtime-verify/detonation pass where the platform
      # can sandbox, graceful-skips where it can't. Set false to disable.
      RUNTIME_VERIFY: ${RUNTIME_VERIFY:-true}
      SCANNER_DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-vulnerability-management-portal}_scanner
      SCANNER_WORKSPACE_VOLUME: ${COMPOSE_PROJECT_NAME:-vulnerability-management-portal}_runner-workspace
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - runner-workspace:/workspace
      - aegis-grype-cache:/home/aegis/.cache/grype
      # Persisted runner auth config so a container restart reuses the token
      # instead of re-registering and creating a duplicate pending runner.
      - runner-config:/home/aegis/.vuln-runner
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      aegis:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  runner-workspace:
  aegis-grype-cache:
  runner-config:
