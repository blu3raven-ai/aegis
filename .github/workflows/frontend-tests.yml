name: Frontend tests

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'tests/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  push:
    branches: [main-v2, main]
    paths:
      - 'frontend/**'
      - 'tests/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: frontend-tests
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        # 22.x ships type-stripping on by default (>= 22.18), which the
        # test:frontend script relies on (it runs .ts/.mts via node --test
        # without an explicit --experimental-strip-types flag).
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test:frontend
