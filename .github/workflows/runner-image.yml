name: Publish runner image

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.github/workflows/runner-image.yml'
    tags: ['v*']
  pull_request:
    paths:
      - 'runner/**'
      - '.github/workflows/runner-image.yml'
  workflow_dispatch:

concurrency:
  group: runner-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}-runner

jobs:
  build-push:
    name: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the honeypot sidecar and bake it into the runner build context as an
      # OCI archive. The runner loads it at startup, so detonation needs no
      # registry pull and works airgapped; provenance is this same pipeline.
      - name: Build embedded honeypot archive
        run: |
          docker build -f runner/sandbox/honeypot.Dockerfile -t aegis-honeypot:embedded runner
          mkdir -p runner/.honeypot
          docker save aegis-honeypot:embedded -o runner/.honeypot/image.tar

      # Only log in when we intend to push (skips on PRs, which just build).
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: ./runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
