name: Aegis PR Gate
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    uses: ./.github/workflows/aegis-scan.yml
    secrets:
      AEGIS_API_TOKEN: ${{ secrets.AEGIS_API_TOKEN }}
      AEGIS_BASE_URL: ${{ secrets.AEGIS_BASE_URL }}

  decide:
    runs-on: ubuntu-latest
    needs: scan
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Aegis CLI
        run: pip install aegis-cli

      - name: Download findings
        uses: actions/download-artifact@v4
        with:
          name: aegis-findings

      # Non-zero exit code from `aegis decide` blocks the merge.
      - name: Gate on findings
        env:
          AEGIS_API_TOKEN: ${{ secrets.AEGIS_API_TOKEN }}
          AEGIS_BASE_URL: ${{ secrets.AEGIS_BASE_URL }}
        run: aegis decide --block-on critical --exit-code

      # Post a summary comment to the PR for visibility.
      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aegis report --format markdown > aegis-report.md
          gh pr comment "$PR_NUMBER" --body-file aegis-report.md
