name: Aegis Scan & Decide
description: >
  Composite action that installs the Aegis CLI, runs a security scan, and
  gates the workflow on findings severity. A non-zero exit signals critical
  findings and blocks the merge.

inputs:
  aegis-api-token:
    description: 'Aegis API token (store as a repo/org secret)'
    required: true
  aegis-base-url:
    description: 'Base URL of the Aegis backend'
    required: true
  scanner-type:
    description: 'Scanner type to run (e.g. dependencies, sast, container)'
    required: false
    default: 'dependencies'
  block-on:
    description: 'Minimum severity that blocks the merge'
    required: false
    default: 'critical'
  warn-on:
    description: 'Minimum severity that emits a warning (does not block)'
    required: false
    default: 'high'
  post-pr-comment:
    description: 'Post a summary comment to the pull request (true/false)'
    required: false
    default: 'true'

outputs:
  findings-path:
    description: 'Path to the raw JSON findings file'
    value: ${{ steps.scan.outputs.findings-path }}

runs:
  using: composite
  steps:
    - name: Install Aegis CLI
      shell: bash
      run: pip install aegis-cli

    - name: Verify CLI install
      shell: bash
      env:
        AEGIS_API_TOKEN: ${{ inputs.aegis-api-token }}
        AEGIS_BASE_URL: ${{ inputs.aegis-base-url }}
      run: aegis --version

    - name: Run scan
      id: scan
      shell: bash
      env:
        AEGIS_API_TOKEN: ${{ inputs.aegis-api-token }}
        AEGIS_BASE_URL: ${{ inputs.aegis-base-url }}
      run: |
        aegis scan --scanner ${{ inputs.scanner-type }} --wait --json > aegis-findings.json
        echo "findings-path=aegis-findings.json" >> "$GITHUB_OUTPUT"

    - name: Gate on findings
      shell: bash
      env:
        AEGIS_API_TOKEN: ${{ inputs.aegis-api-token }}
        AEGIS_BASE_URL: ${{ inputs.aegis-base-url }}
      run: >
        aegis decide
        --block-on ${{ inputs.block-on }}
        --warn-on ${{ inputs.warn-on }}
        --exit-code

    - name: Post PR comment
      if: ${{ inputs.post-pr-comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        AEGIS_API_TOKEN: ${{ inputs.aegis-api-token }}
        AEGIS_BASE_URL: ${{ inputs.aegis-base-url }}
      run: |
        aegis report --format markdown > aegis-report.md
        gh pr comment "$PR_NUMBER" --body-file aegis-report.md
