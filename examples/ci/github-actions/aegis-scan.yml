name: Aegis Scan
on:
  workflow_call:
    inputs:
      scanner-type:
        description: 'Scanner type to run'
        required: false
        type: string
        default: 'dependencies'
    secrets:
      AEGIS_API_TOKEN:
        required: true
      AEGIS_BASE_URL:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Aegis CLI
        run: pip install aegis-cli

      - name: Verify CLI install
        env:
          AEGIS_API_TOKEN: ${{ secrets.AEGIS_API_TOKEN }}
          AEGIS_BASE_URL: ${{ secrets.AEGIS_BASE_URL }}
        run: aegis --version

      - name: Run scan
        env:
          AEGIS_API_TOKEN: ${{ secrets.AEGIS_API_TOKEN }}
          AEGIS_BASE_URL: ${{ secrets.AEGIS_BASE_URL }}
        run: aegis scan --scanner ${{ inputs.scanner-type }} --wait --json > aegis-findings.json

      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-findings
          path: aegis-findings.json
        if: always()
