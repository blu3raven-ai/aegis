version: 2.1

# Required context variables (set in CircleCI > Project Settings > Environment Variables):
#   AEGIS_API_TOKEN — Aegis API token
#   AEGIS_BASE_URL  — URL of the Aegis backend

executors:
  python:
    docker:
      - image: cimg/python:3.11

jobs:
  aegis-scan:
    executor: python
    steps:
      - checkout
      - run:
          name: Install Aegis CLI
          command: pip install aegis-cli
      - run:
          name: Verify CLI install
          command: aegis --version
      - run:
          name: Run scan
          command: aegis scan --scanner dependencies --wait --json > aegis-findings.json
      - store_artifacts:
          path: aegis-findings.json
          destination: aegis-findings
      - persist_to_workspace:
          root: .
          paths:
            - aegis-findings.json

  aegis-decide:
    executor: python
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Aegis CLI
          command: pip install aegis-cli
      # Non-zero exit code from `aegis decide` fails the job and blocks the PR.
      - run:
          name: Gate on findings
          command: aegis decide --block-on critical --exit-code

workflows:
  pr-security-gate:
    jobs:
      - aegis-scan
      - aegis-decide:
          requires:
            - aegis-scan
