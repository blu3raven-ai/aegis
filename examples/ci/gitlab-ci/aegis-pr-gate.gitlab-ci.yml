# Aegis PR gate template — runs a scan then gates the pipeline on findings.
#
# Required CI/CD variables (Settings > CI/CD > Variables, masked + protected):
#   AEGIS_API_TOKEN  — Aegis API token
#   AEGIS_BASE_URL   — URL of the Aegis backend
#
# Usage: include this file in your .gitlab-ci.yml:
#
#   include:
#     - local: 'examples/ci/gitlab-ci/aegis-pr-gate.gitlab-ci.yml'

stages:
  - security

variables:
  AEGIS_SCANNER_TYPE: "dependencies"
  AEGIS_BLOCK_ON: "critical"

aegis-scan:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install --quiet aegis-cli
    - aegis --version
  script:
    - aegis scan --scanner "$AEGIS_SCANNER_TYPE" --wait --json > aegis-findings.json
  artifacts:
    name: "aegis-findings-${CI_JOB_ID}"
    paths:
      - aegis-findings.json
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

aegis-decide:
  stage: security
  image: python:3.11-slim
  needs:
    - job: aegis-scan
      artifacts: true
  before_script:
    - pip install --quiet aegis-cli
  script:
    # Non-zero exit code from `aegis decide` marks the pipeline as failed and
    # prevents the merge request from being merged.
    - aegis decide --block-on "$AEGIS_BLOCK_ON" --exit-code
    # Post a summary note to the MR when the GitLab CLI is available.
    - |
      if command -v glab &>/dev/null && [ -n "$CI_MERGE_REQUEST_IID" ]; then
        aegis report --format markdown > aegis-report.md
        glab mr note "$CI_MERGE_REQUEST_IID" --message "$(cat aegis-report.md)"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
