# Aegis scan template — include this file and extend the `aegis-scan` job,
# or use `include:` to pull it into your top-level pipeline.
#
# Required CI/CD variables:
#   AEGIS_API_TOKEN  — secret, set in Settings > CI/CD > Variables
#   AEGIS_BASE_URL   — URL of the Aegis backend

.aegis-scan:
  stage: security
  image: python:3.11-slim
  variables:
    AEGIS_SCANNER_TYPE: "dependencies"
  before_script:
    - pip install --quiet aegis-cli
    - aegis --version
  script:
    - aegis scan --scanner "$AEGIS_SCANNER_TYPE" --wait --json > aegis-findings.json
  artifacts:
    name: "aegis-findings-${CI_JOB_ID}"
    paths:
      - aegis-findings.json
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

# Concrete job — override variables or rules in your own pipeline as needed.
aegis-scan:
  extends: .aegis-scan
