# block-on-critical.yml — Strict posture
#
# CI fails on any critical-severity finding or when a vulnerability's
# EPSS score exceeds 0.7 (high exploitation probability).
# Ideal for production services and regulated environments.

block_on:
  - severity: critical
  - epss_above: 0.7

warn_on:
  - severity: high
  - severity: medium

allow:
  - default: true

exclude_paths:
  - "tests/**"
  - "**/__pycache__/**"
  - "docs/**"

exclude_packages:
  # Add package@version pairs to suppress known-acceptable exceptions
  # - example-package@1.2.3
