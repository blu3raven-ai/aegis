# warn-on-high.yml — Moderate posture
#
# CI fails only on critical severity.  High and medium findings trigger
# visible warnings so engineers are aware but not blocked.
# Suitable for internal tooling or early-stage projects building
# towards a stricter gate over time.

block_on:
  - severity: critical

warn_on:
  - severity: high
  - severity: medium
  - epss_above: 0.5

allow:
  - severity: low
  - default: true

exclude_paths:
  - "tests/**"
  - "**/__pycache__/**"

exclude_packages:
  # - example-package@1.2.3
