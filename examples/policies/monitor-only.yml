# monitor-only.yml — Observability-only posture
#
# Never fails or warns in CI — all findings are surfaced as informational
# observations only.  Useful when onboarding a legacy codebase where you
# want full visibility before committing to enforcement.

block_on: []

warn_on: []

allow:
  - default: true

exclude_paths:
  - "**/__pycache__/**"

exclude_packages: []
